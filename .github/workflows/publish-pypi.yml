name: publish-pypi

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/test.yml

  package:
    name: Build verified distributions
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Verify release tag and project versions
        run: python scripts/verify_release.py "${{ github.event.release.tag_name }}"
      - name: Install build frontend
        run: python -m pip install "build==1.3.0"
      - name: Build wheel and source distribution
        run: python -m build
      - name: Store immutable distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish getbible-mcp to PyPI
    needs: package
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/getbible-mcp/
    permissions:
      id-token: write
    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
