name: publish-pypi

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag matching the package metadata
        required: true
        default: v1.0.0
        type: string

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/test.yml

  release-check:
    name: Verify release version
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Verify release tag and project versions
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: python scripts/verify_release.py "$RELEASE_TAG"

  publish:
    name: Publish getbible-mcp to PyPI
    needs: [validate, release-check]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/getbible-mcp/
    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish with the protected PyPI API token
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          print-hash: true
