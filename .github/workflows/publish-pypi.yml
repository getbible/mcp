name: publish-pypi

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/test.yml

  release-check:
    name: Verify release version
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Verify release tag and project versions
        run: python scripts/verify_release.py "${{ github.event.release.tag_name }}"

  publish:
    name: Publish getbible-mcp to PyPI
    needs: [validate, release-check]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/getbible-mcp/
    permissions:
      id-token: write
    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
