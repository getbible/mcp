name: test

on:
  push:
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  python:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Create isolated environment
        run: python -m venv .venv
      - name: Install
        run: |
          .venv/bin/python -m pip install -r requirements-dev.txt
          .venv/bin/python -m pip install --no-deps -e .
      - name: Lint
        run: .venv/bin/python -m ruff check .
      - name: Type check
        run: .venv/bin/python -m mypy src
      - name: Test both MCP transports
        run: .venv/bin/python -m pytest

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@v4
      - name: Build production image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: getbible-mcp:test

  package:
    name: Build downloadable distributions
    needs: [python, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v7
        with:
          python-version: "3.14"
          cache: pip
      - name: Install build frontend
        run: python -m pip install -r requirements-dev.txt
      - name: Build wheel and source distribution
        run: python -m build
      - name: Smoke-test the built wheel
        run: |
          python -m venv .artifact-test
          .artifact-test/bin/python -m pip install -r requirements.txt
          .artifact-test/bin/python -m pip install --no-deps dist/getbible_mcp-*.whl
          .artifact-test/bin/getbible-mcp --version
      - name: Upload downloadable distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 30
