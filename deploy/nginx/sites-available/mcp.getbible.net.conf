server {
    listen 80;
    listen [::]:80;
    server_name mcp.getbible.net;

    root /opt/getbible-mcp/current/site;
    index index.html;
    client_max_body_size 1m;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header X-Frame-Options DENY always;

    # Exact, no-trailing-slash MCP Streamable HTTP endpoint.
    # Both POST and GET belong to the MCP protocol at this location.
    location = /v2 {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # Nginx serves discovery and all version-specific documentation directly.
    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(?:json|txt|md)$ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri =404;
    }
}
