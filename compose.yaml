services:
  getbible-mcp:
    build: .
    image: getbible-mcp:1.0.0
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      GETBIBLE_MCP_PUBLIC_BASE: https://mcp.getbible.net
      GETBIBLE_MCP_ALLOWED_HOSTS: mcp.getbible.net,mcp.getbible.net:*,127.0.0.1,127.0.0.1:*,localhost,localhost:*
      GETBIBLE_MCP_ALLOWED_ORIGINS: https://mcp.getbible.net,http://localhost:*,http://127.0.0.1:*

